<?xml version="1.0" encoding="UTF-8"?>
<svg id="_レイヤー_2" data-name="レイヤー 2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <style>
      .cls-1 { fill: #231815; }
      .cls-2 { fill: #fff; }
      .cls-3 { stroke: #000221; stroke-width: 10px; fill: #fff; }
      .cls-3, .cls-4, .cls-5, .cls-6 {
        stroke-miterlimit: 10;
      }
      .cls-4, .cls-5, .cls-6 { fill: none; }
      .cls-4 { stroke-width: 7.64738px; }
      .cls-4, .cls-5, .cls-6 { stroke: #000; }
      .cls-5 { stroke-width: 7.647px; }
      .cls-6 { stroke-width: 7px; }

      /* line1: 左→右 */
      #line1_L-R {
        stroke-dasharray: 88.36;
        stroke-dashoffset: 88.36;
        animation: drawLR1 2.4s ease-in-out infinite;
      }

      /* line2: 左→右 */
      #line2_L-R {
        stroke-dasharray: 105.45;
        stroke-dashoffset: 105.45;
        animation: drawLR2 2.4s ease-in-out infinite;
      }

      /* line3: 上→下（パスに沿って） */
      #line3_t-b {
        stroke-dasharray: 200;
        stroke-dashoffset: 200;
        animation: drawTB 2.4s ease-in-out infinite;
      }

      /* 楕円（常に表示） */
      /* .cls-3 は常に表示のままにする */

      @keyframes drawLR1 {
        0%   { stroke-dashoffset: 88.36; opacity: 1; }
        18%  { stroke-dashoffset: 0;     opacity: 1; }
        80%  { stroke-dashoffset: 0;     opacity: 1; }
        95%  { stroke-dashoffset: 0;     opacity: 0; }
        96%  { stroke-dashoffset: 88.36; opacity: 0; }
        100% { stroke-dashoffset: 88.36; opacity: 0; }
      }

      @keyframes drawLR2 {
        0%   { stroke-dashoffset: 105.45; opacity: 0; }
        8%   { stroke-dashoffset: 105.45; opacity: 1; }
        30%  { stroke-dashoffset: 0;      opacity: 1; }
        80%  { stroke-dashoffset: 0;      opacity: 1; }
        95%  { stroke-dashoffset: 0;      opacity: 0; }
        96%  { stroke-dashoffset: 105.45; opacity: 0; }
        100% { stroke-dashoffset: 105.45; opacity: 0; }
      }

      @keyframes drawTB {
        0%   { stroke-dashoffset: 200; opacity: 0; }
        18%  { stroke-dashoffset: 200; opacity: 1; }
        50%  { stroke-dashoffset: 0;   opacity: 1; }
        80%  { stroke-dashoffset: 0;   opacity: 1; }
        95%  { stroke-dashoffset: 0;   opacity: 0; }
        96%  { stroke-dashoffset: 200; opacity: 0; }
        100% { stroke-dashoffset: 200; opacity: 0; }
      }
    </style>
  </defs>
